name: Diagnose stage 3 Meson build

on:
  pull_request:
    branches:
      - feature/pyspharm-ng-stage-2-packaging

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Fortran compiler
        run: |
          sudo apt-get update
          sudo apt-get install --yes gfortran

      - name: Capture package-install log
        id: install
        continue-on-error: true
        run: |
          set -o pipefail
          python -m pip install --upgrade pip 2>&1 | tee pip-install.log
          python -m pip install --verbose build ".[tests]" 2>&1 | tee -a pip-install.log

      - name: Upload diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage3-build-diagnostic-${{ github.sha }}
          path: pip-install.log
          if-no-files-found: error
          retention-days: 7

      - name: Surface installation failure
        if: steps.install.outcome != 'success'
        run: exit 1
