name: Apply stage 2 compatibility migration

on:
  pull_request:
    branches:
      - feature/pyspharm-ng-stage-1-foundation
    paths:
      - Lib/spharm.py
      - tools/maintenance/modernize_integer_division.py
      - .github/workflows/apply-stage-2-migration.yml

permissions:
  contents: write

jobs:
  migrate:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Apply targeted compatibility migration
        run: python tools/maintenance/modernize_integer_division.py --apply

      - name: Commit generated source update
        run: |
          if git diff --quiet -- Lib/spharm.py; then
            echo "No generated source update is needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Lib/spharm.py
          git commit -m "fix: repair Python 3 workspace integer divisions"
          git push origin HEAD:${{ github.head_ref }}
