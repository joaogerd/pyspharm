name: Create verified GitHub Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing stable tag to validate and package, for example v0.1.0
        required: true
        type: string
      create_github_release:
        description: Create or update the GitHub Release after all checks pass
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate stable release metadata
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.release_tag.outputs.tag }}
    steps:
      - name: Select release tag
        id: release_tag
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          case "$RELEASE_TAG" in
            v*) ;;
            *) echo "release tag must begin with v" >&2; exit 1 ;;
          esac
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Check out tagged source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release_tag.outputs.tag }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag, version and changelog
        run: python tools/release/verify_release_metadata.py --tag "${{ steps.release_tag.outputs.tag }}"

  source_distribution:
    name: Build and test source distribution
    needs: validate
    runs-on: ubuntu-24.04
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes gfortran
          python -m pip install --upgrade build

      - name: Build source distribution
        run: python -m build --sdist --outdir release-dist

      - name: Install and smoke-test source distribution outside checkout
        run: |
          python -m venv /tmp/pyspharm-release-sdist
          /tmp/pyspharm-release-sdist/bin/python -m pip install --upgrade pip
          /tmp/pyspharm-release-sdist/bin/python -m pip install release-dist/*.tar.gz
          cd /tmp
          /tmp/pyspharm-release-sdist/bin/python - <<'PY'
          import numpy as np
          import pyspharm

          transform = pyspharm.SphericalHarmonicTransform(64, 32, grid="regular")
          field = pyspharm.as_real32(np.ones((32, 64)))
          assert transform.analyze_scalar(field, truncation=21).shape == (253,)
          PY

      - name: Upload source distribution
        uses: actions/upload-artifact@v4
        with:
          name: release-sdist
          path: release-dist/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  portable_wheels:
    name: Build and test portable Linux wheels
    needs: validate
    runs-on: ubuntu-24.04
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Set up build Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install wheel builder
        run: python -m pip install --upgrade "cibuildwheel==2.23.3"

      - name: Build and test wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-*"
          CIBW_SKIP: "pp* *-musllinux*"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_28"
          CIBW_BEFORE_ALL_LINUX: "dnf install --assumeyes gcc-gfortran"
          CIBW_TEST_COMMAND: >-
            cd /tmp && python -c "import numpy as np; import pyspharm; transform = pyspharm.SphericalHarmonicTransform(64, 32, grid='gaussian'); field = pyspharm.as_real32(np.ones((32, 64))); assert transform.analyze_scalar(field, truncation=21).shape == (253,)"

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-wheels
          path: wheelhouse/*.whl
          if-no-files-found: error
          retention-days: 7

  github_release:
    name: Publish GitHub Release
    needs:
      - validate
      - source_distribution
      - portable_wheels
    if: github.event_name == 'push' || inputs.create_github_release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Create GitHub Release with verified artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
        run: |
          test -n "$RELEASE_TAG"
          gh release create "$RELEASE_TAG" \
            --title "pyspharm-ng ${RELEASE_TAG#v}" \
            --generate-notes \
            release-assets/*.tar.gz release-assets/*.whl
