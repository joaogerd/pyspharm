name: Capture legacy numerical reference

on:
  workflow_dispatch:
  push:
    branches:
      - feature/pyspharm-ng-stage-1-foundation
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  capture:
    name: Build and capture legacy contract
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Fortran compiler
        run: |
          sudo apt-get update
          sudo apt-get install --yes gfortran

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[tests]"

      - name: Capture candidate reference
        run: |
          mkdir -p reference-artifact
          python tests/reference/generate_legacy_baseline.py \
            --output reference-artifact/legacy-contract-v1.npz
          python tests/reference/validate_legacy_baseline.py \
            --reference reference-artifact/legacy-contract-v1.npz

      - name: Upload candidate reference
        uses: actions/upload-artifact@v4
        with:
          name: legacy-contract-v1-${{ github.sha }}
          path: reference-artifact/legacy-contract-v1.npz
          if-no-files-found: error
          retention-days: 90
