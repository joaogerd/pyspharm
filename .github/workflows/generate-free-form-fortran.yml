name: Generate free-form Fortran sources

on:
  workflow_dispatch:
  push:
    branches:
      - feature/pyspharm-ng-stage-3-fortran-modernization
  pull_request:
    branches:
      - feature/pyspharm-ng-stage-2-packaging

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Generate free-form Fortran
        run: python tools/fortran/fixed_to_free.py --apply

      - name: Upload generated sources
        uses: actions/upload-artifact@v4
        with:
          name: free-form-fortran-${{ github.sha }}
          path: src/free_form/
          if-no-files-found: error
          retention-days: 14
